<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter - GK Library</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:linear-gradient(to right,#fc5e4c,#f53434);
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    width:90%;
    max-width:700px;
    margin:50px auto;
}

.newsletter-box{
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

.newsletter-box h2{
    color:#016e68;
    margin-bottom:15px;
}

.newsletter-box p{
    color:#555;
    line-height:1.8;
    margin-bottom:25px;
}

input[type="text"],
input[type="email"]{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#016e68;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#014d49;
}

footer{
    background:#016e68;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}
</style>

</head>
<body>

<header>
    <h1>GK Library Newsletter</h1>
    <p>Stay updated with the latest books and offers.</p>
</header>

<div class="container">

    <div class="newsletter-box">

        <h2>Subscribe to Our Newsletter</h2>

        <p>
            Join the GK Library community to receive updates about
            new books, exclusive offers, author interviews,
            reading tips, and upcoming events directly in your inbox.
        </p>

        <form>
            <input type="text" placeholder="Enter Your Name" required>
            <input type="email" placeholder="Enter Your Email" required>

            <button type="submit">Subscribe</button>
        </form>

    </div>

</div>

<footer>
    © 2026 GK Library | Newsletter
</footer>

</body>
</html>
